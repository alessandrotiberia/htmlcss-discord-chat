<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htmlcss-discord-chat</title>
    <link rel="stylesheet" href="./styles/index.css">
    <!-- Bootstrap Icone -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
</head>

<body> <!--
    .app divide la pagina in due colonne,

.sidebar a sinistra è stretta per i loghi,

.content a destra contiene il tuo header e tutto il resto.-->
    <div class="app">
    <!-- colonna sinistra: loghi -->
    <aside class="sidebar">
        <img src="./img/logo.webp" alt="">
     <img src="./img/server arte.png" alt="">
     <img src="./img/server_boolean.png" alt="">
     <img src="./img/server_italia.png" alt="">
     <img src="./img/server_javascript.png" alt="">
     <img src="./img/server_nintendo.png" alt="">
    <img src="./img/server_pokemon.png" alt="">
    </aside>
    <header> <!--creato classe per racchiudere header.
        span (strumenti) dove ho messo titolo lente di ricerca e barra aggiungi amici.
        altro div per racchiudere barra aggiungi amici.  -->
        <div class="intro">
            <h1>Messaggi</h1>
            <span class="strumenti">
                <i class="bi bi-search"></i> <!-- FIGLIO diretto di .strumenti -->
                <div class="aggiungi-amici">
                    <i class="bi bi-person-fill-add"></i> <!--FIGLIO di .aggiungi-amici-->
                    <span class="add-friends">Aggiungi amici</span>
                </div>
            </span>
        </div>
    </header>
    <main>
        <section class="chat-list">
  <div class="chat-item">
    <img src="./img/profile1.webp" alt="Giuseppe Rossi">
    <div class="chat-text">
      <div class="chat-row">
        <span class="chat-name">Giuseppe Rossi</span>
        <span class="chat-time">2min</span>
      </div>
      <span class="chat-preview">ciao! tutto bene?</span>
        <footer>
            <div>
                <span>pagina principale</span>
                <span>notifiche</span>
                <span>Tu</span>
                <img src="./img/profile1.webp" alt="foto profilo account">
            </div>
        </footer>
    </main>
</body>

</html>
